{% extends "base.html" %}
{% block title %}Comparador — WAS Contabil{% endblock %}

{% block content %}
<div class="space-y-6" x-data="comparador()">

  <!-- Header -->
  <div>
    <h1 class="text-2xl font-bold text-surface-900 dark:text-white">Comparador de Modalidades</h1>
    <p class="mt-1 text-sm text-surface-500 dark:text-surface-400">
      Compare TPV vs Capacidade de Pagamento e descubra qual e mais vantajosa
    </p>
  </div>

  <!-- Form -->
  <div class="bg-white dark:bg-surface-800 rounded-xl shadow-sm border border-surface-200 dark:border-surface-700 p-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

      <div>
        <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1">Valor Total da Divida (R$)</label>
        <div class="relative">
          <span class="absolute left-3 top-2.5 text-sm text-surface-400">R$</span>
          <input type="text" x-model="form.valor_total" placeholder="0,00" data-mask="moeda"
                 class="w-full pl-10 rounded-lg border border-surface-300 dark:border-surface-600 bg-white dark:bg-surface-900 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400 focus:border-brand-400 transition-colors">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1">Classificacao CAPAG</label>
        <select x-model="form.classificacao"
                class="w-full rounded-lg border border-surface-300 dark:border-surface-600 bg-white dark:bg-surface-900 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400 focus:border-brand-400 transition-colors">
          <option value="A">A — Alta Recuperacao</option>
          <option value="B">B — Media Recuperacao</option>
          <option value="C">C — Dificil Recuperacao</option>
          <option value="D" selected>D — Irrecuperavel</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-surface-700 dark:text-surface-300 mb-1">Porte</label>
        <select x-model="form.is_me_epp"
                class="w-full rounded-lg border border-surface-300 dark:border-surface-600 bg-white dark:bg-surface-900 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400 focus:border-brand-400 transition-colors">
          <option value="true">ME / EPP</option>
          <option value="false">Demais Empresas</option>
        </select>
      </div>

      <div class="flex items-center gap-3">
        <label class="inline-flex items-center gap-2 cursor-pointer">
          <input type="checkbox" x-model="form.tpv_elegivel" checked
                 class="h-4 w-4 rounded border-surface-300 text-brand-500 focus:ring-brand-500">
          <span class="text-sm text-surface-700 dark:text-surface-300">Elegivel para TPV</span>
        </label>
      </div>
    </div>

    <div class="mt-6">
      <button @click="comparar()"
              class="rounded-lg bg-brand-500 px-6 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all duration-200">
        Comparar Modalidades
      </button>
    </div>
  </div>

  <!-- Resultado -->
  <template x-if="resultado">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Card Capacidade de Pagamento -->
      <div class="bg-white dark:bg-surface-800 rounded-xl shadow-sm border-2 p-6 transition-all"
           :class="resultado.recomendacao === 'CAPACIDADE' ? 'border-brand-400 ring-2 ring-brand-400/20' : 'border-surface-200 dark:border-surface-700'">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-semibold text-surface-900 dark:text-white">Capacidade de Pagamento</h3>
          <template x-if="resultado.recomendacao === 'CAPACIDADE'">
            <span class="inline-flex items-center gap-1 rounded-full bg-brand-100 dark:bg-brand-900/30 px-3 py-1 text-xs font-semibold text-brand-700 dark:text-brand-300">
              Recomendado
            </span>
          </template>
        </div>
        <div class="space-y-3">
          <div class="flex justify-between">
            <span class="text-sm text-surface-500">Valor Final</span>
            <span class="text-lg font-bold text-surface-900 dark:text-white" x-text="'R$ ' + parseFloat(resultado.capacidade.valor_final).toLocaleString('pt-BR', {minimumFractionDigits: 2})"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-sm text-surface-500">Economia</span>
            <span class="text-sm font-semibold text-green-600 dark:text-green-400" x-text="'R$ ' + parseFloat(resultado.capacidade.economia).toLocaleString('pt-BR', {minimumFractionDigits: 2})"></span>
          </div>
        </div>
      </div>

      <!-- Card TPV -->
      <div class="bg-white dark:bg-surface-800 rounded-xl shadow-sm border-2 p-6 transition-all"
           :class="resultado.recomendacao === 'TPV' ? 'border-brand-400 ring-2 ring-brand-400/20' : 'border-surface-200 dark:border-surface-700'"
           x-show="resultado.tpv.disponivel">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-semibold text-surface-900 dark:text-white">Transacao Pequeno Valor</h3>
          <template x-if="resultado.recomendacao === 'TPV'">
            <span class="inline-flex items-center gap-1 rounded-full bg-brand-100 dark:bg-brand-900/30 px-3 py-1 text-xs font-semibold text-brand-700 dark:text-brand-300">
              Recomendado
            </span>
          </template>
        </div>
        <div class="space-y-3">
          <div class="flex justify-between">
            <span class="text-sm text-surface-500">Valor Final</span>
            <span class="text-lg font-bold text-surface-900 dark:text-white" x-text="'R$ ' + parseFloat(resultado.tpv.valor_final).toLocaleString('pt-BR', {minimumFractionDigits: 2})"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-sm text-surface-500">Economia</span>
            <span class="text-sm font-semibold text-green-600 dark:text-green-400" x-text="'R$ ' + parseFloat(resultado.tpv.economia).toLocaleString('pt-BR', {minimumFractionDigits: 2})"></span>
          </div>
        </div>
      </div>

      <!-- TPV nao disponivel -->
      <div x-show="!resultado.tpv.disponivel"
           class="bg-surface-50 dark:bg-surface-800/50 rounded-xl border border-dashed border-surface-300 dark:border-surface-600 p-6 flex items-center justify-center">
        <p class="text-sm text-surface-400 text-center">
          TPV nao disponivel para esta divida<br>
          <span class="text-xs">(valor acima de 60 SM ou nao elegivel)</span>
        </p>
      </div>

      <!-- Resumo -->
      <div class="md:col-span-2 bg-surface-50 dark:bg-surface-900 rounded-xl border border-surface-200 dark:border-surface-700 p-4">
        <div class="flex items-center gap-3">
          <div class="flex-shrink-0 h-10 w-10 rounded-full bg-brand-100 dark:bg-brand-900/30 flex items-center justify-center">
            <svg class="h-5 w-5 text-brand-600 dark:text-brand-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div>
            <p class="text-sm font-semibold text-surface-900 dark:text-white">
              Recomendacao: <span class="text-brand-600 dark:text-brand-400" x-text="resultado.recomendacao === 'TPV' ? 'Transação de Pequeno Valor' : 'Capacidade de Pagamento'"></span>
            </p>
            <p class="text-xs text-surface-500" x-show="parseFloat(resultado.economia_diferenca) > 0">
              Economia adicional de <span class="font-semibold text-green-600" x-text="'R$ ' + parseFloat(resultado.economia_diferenca).toLocaleString('pt-BR', {minimumFractionDigits: 2})"></span> em relacao a outra modalidade
            </p>
          </div>
        </div>
      </div>

    </div>
  </template>

</div>

<script>
function comparador() {
  return {
    form: {
      valor_total: '',
      classificacao: 'D',
      is_me_epp: 'true',
      tpv_elegivel: true,
    },
    resultado: null,
    async comparar() {
      const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value
        || document.cookie.match(/csrftoken=([^;]+)/)?.[1]
        || document.querySelector('input[name="csrf_token"]')?.value;

      const res = await fetch('/api/v1/comparador/comparar/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken,
        },
        body: JSON.stringify({
          valor_total: this.form.valor_total.replace(/\./g, '').replace(',', '.'),
          percentual_previdenciario: '0',
          is_me_epp: this.form.is_me_epp === 'true',
          classificacao: this.form.classificacao,
          tpv_elegivel: this.form.tpv_elegivel,
        }),
      });
      if (res.ok) {
        this.resultado = await res.json();
      }
    },
  };
}
</script>
{% endblock %}
