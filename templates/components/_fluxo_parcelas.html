<!-- Tabela de parcelas responsiva com toggle Alpine.js -->
<!-- Uso: {% include "components/_fluxo_parcelas.html" with parcelas=result.parcelas %} -->
{% if parcelas %}
<div x-data="{ showAll: false }" class="space-y-3">
  <h3 class="text-base font-semibold text-surface-800 dark:text-surface-200">
    Fluxo de Parcelas
  </h3>

  <!-- Tabela com scroll horizontal no mobile -->
  <div class="overflow-x-auto -mx-4 sm:mx-0 rounded-lg">
    <div class="inline-block min-w-full align-middle">
      <table class="min-w-full divide-y divide-surface-200 dark:divide-surface-700">
        <thead class="bg-surface-100 dark:bg-surface-800">
          <tr>
            <th scope="col" class="px-4 py-3 text-left text-xs font-semibold text-surface-600 dark:text-surface-400 uppercase tracking-wider">
              Mês
            </th>
            <th scope="col" class="px-4 py-3 text-left text-xs font-semibold text-surface-600 dark:text-surface-400 uppercase tracking-wider">
              Tipo
            </th>
            <th scope="col" class="px-4 py-3 text-right text-xs font-semibold text-surface-600 dark:text-surface-400 uppercase tracking-wider">
              Valor
            </th>
          </tr>
        </thead>
        <tbody class="divide-y divide-surface-200 dark:divide-surface-700 bg-white dark:bg-surface-900">
          {% for parcela in parcelas %}
          <tr class="{% if forloop.counter > 24 %}parcela-extra{% endif %} hover:bg-surface-50 dark:hover:bg-surface-800 transition-colors duration-150"
              x-show="showAll || {{ forloop.counter }} <= 24">
            <td class="whitespace-nowrap px-4 py-3 text-sm text-surface-800 dark:text-surface-200">
              {{ parcela.mes }}
            </td>
            <td class="whitespace-nowrap px-4 py-3 text-sm">
              {% if parcela.tipo == "entrada" %}
              <span class="inline-flex items-center rounded-full bg-brand-100 dark:bg-brand-900/30 px-2.5 py-0.5 text-xs font-medium text-brand-700 dark:text-brand-400">
                Entrada
              </span>
              {% else %}
              <span class="inline-flex items-center rounded-full bg-surface-100 dark:bg-surface-700 px-2.5 py-0.5 text-xs font-medium text-surface-600 dark:text-surface-300">
                Parcela
              </span>
              {% endif %}
            </td>
            <td class="whitespace-nowrap px-4 py-3 text-sm text-right font-mono text-surface-800 dark:text-surface-200">
              R$ {{ parcela.valor|floatformat:2 }}
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

  <!-- Toggle para mostrar todas as parcelas -->
  {% if parcelas|length > 24 %}
  <div class="text-center">
    <button @click="showAll = !showAll"
            class="inline-flex items-center gap-1 rounded-lg px-4 py-2 text-sm font-medium text-brand-600 dark:text-brand-400 hover:bg-brand-50 dark:hover:bg-brand-900/20 transition-all duration-200">
      <span x-text="showAll ? 'Mostrar menos' : 'Ver todas as {{ parcelas|length }} parcelas'"></span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform duration-200" :class="{ 'rotate-180': showAll }" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
      </svg>
    </button>
  </div>
  {% endif %}
</div>
{% endif %}
