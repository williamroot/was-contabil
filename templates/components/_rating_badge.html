<!-- Rating CAPAG badge colorido -->
<!-- Uso: {% include "components/_rating_badge.html" with rating="A" %} -->
{% if rating == "A" %}
<span class="inline-flex items-center rounded-full bg-green-100 dark:bg-green-900/30 px-3 py-1 text-sm font-semibold text-green-700 dark:text-green-400 ring-1 ring-inset ring-green-600/20 dark:ring-green-500/30">
  A &mdash; Alta Recuperação
</span>
{% elif rating == "B" %}
<span class="inline-flex items-center rounded-full bg-yellow-100 dark:bg-yellow-900/30 px-3 py-1 text-sm font-semibold text-yellow-700 dark:text-yellow-400 ring-1 ring-inset ring-yellow-600/20 dark:ring-yellow-500/30">
  B &mdash; Média Recuperação
</span>
{% elif rating == "C" %}
<span class="inline-flex items-center rounded-full bg-orange-100 dark:bg-orange-900/30 px-3 py-1 text-sm font-semibold text-orange-700 dark:text-orange-400 ring-1 ring-inset ring-orange-600/20 dark:ring-orange-500/30">
  C &mdash; Difícil Recuperação
</span>
{% elif rating == "D" %}
<span class="inline-flex items-center rounded-full bg-red-100 dark:bg-red-900/30 px-3 py-1 text-sm font-semibold text-red-700 dark:text-red-400 ring-1 ring-inset ring-red-600/20 dark:ring-red-500/30">
  D &mdash; Irrecuperável
</span>
{% endif %}
