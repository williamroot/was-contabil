<!-- Container de notificações toast (HTMX swap-oob + Alpine.js auto-dismiss) -->
<div id="toast-container"
     class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 w-full max-w-sm px-4 sm:px-0"
     aria-live="polite">

  <!-- Django messages (renderizados no carregamento da página) -->
  {% if messages %}
  {% for message in messages %}
  <div x-data="{ show: true }"
       x-init="setTimeout(() => show = false, 5000)"
       x-show="show"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-y-2"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-2"
       class="rounded-lg shadow-lg p-4 flex items-start gap-3
              {% if message.tags == 'success' %}bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800
              {% elif message.tags == 'error' %}bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800
              {% elif message.tags == 'warning' %}bg-yellow-50 dark:bg-yellow-900/30 border border-yellow-200 dark:border-yellow-800
              {% else %}bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800{% endif %}">
    <!-- Icon -->
    {% if message.tags == "success" %}
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 text-green-500" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
    </svg>
    {% elif message.tags == "error" %}
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 text-red-500" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
    </svg>
    {% elif message.tags == "warning" %}
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 text-yellow-500" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
    </svg>
    {% else %}
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 text-blue-500" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
    </svg>
    {% endif %}
    <!-- Message text -->
    <p class="text-sm font-medium
              {% if message.tags == 'success' %}text-green-800 dark:text-green-300
              {% elif message.tags == 'error' %}text-red-800 dark:text-red-300
              {% elif message.tags == 'warning' %}text-yellow-800 dark:text-yellow-300
              {% else %}text-blue-800 dark:text-blue-300{% endif %}">
      {{ message }}
    </p>
    <!-- Close button -->
    <button @click="show = false" class="ml-auto flex-shrink-0 rounded-lg p-1 hover:bg-surface-200 dark:hover:bg-surface-700 transition-colors duration-200" aria-label="Fechar">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-surface-400" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
      </svg>
    </button>
  </div>
  {% endfor %}
  {% endif %}
</div>

<!-- HTMX OOB swap target for server-pushed toasts -->
<template id="toast-template">
  <div x-data="{ show: true }"
       x-init="setTimeout(() => show = false, 5000)"
       x-show="show"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-y-2"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-2"
       class="rounded-lg shadow-lg p-4 flex items-start gap-3 bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800">
    <p class="text-sm font-medium text-green-800 dark:text-green-300"></p>
  </div>
</template>
