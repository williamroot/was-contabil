<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5dc8a"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
    <linearGradient id="neuralGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="64" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="#d4a843" stroke-width="0.5" opacity="0.03">
    <line x1="96" y1="16" x2="96" y2="496"/>
    <line x1="176" y1="16" x2="176" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="336" y1="16" x2="336" y2="496"/>
    <line x1="416" y1="16" x2="416" y2="496"/>
    <line x1="16" y1="96" x2="496" y2="96"/>
    <line x1="16" y1="176" x2="496" y2="176"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="336" x2="496" y2="336"/>
    <line x1="16" y1="416" x2="496" y2="416"/>
  </g>

  <!-- Shield -->
  <g transform="translate(256, 195)">
    <!-- Shield glow -->
    <path d="M0,-130 L108,-98 L108,22 C108,88 60,130 0,156 C-60,130 -108,88 -108,22 L-108,-98 Z"
          fill="#d4a843" opacity="0.03"/>
    <!-- Shield outer -->
    <path d="M0,-120 L100,-90 L100,20 C100,80 55,120 0,145 C-55,120 -100,80 -100,20 L-100,-90 Z"
          stroke="url(#goldGrad)" stroke-width="4" fill="none" opacity="0.75"/>
    <!-- Shield inner -->
    <path d="M0,-105 L85,-78 L85,16 C85,68 48,104 0,126 C-48,104 -85,68 -85,16 L-85,-78 Z"
          stroke="#d4a843" stroke-width="1.5" fill="none" opacity="0.12"/>

    <!-- === BRAIN (AI) — top half === -->
    <g transform="translate(0, -40)">
      <!-- Brain left hemisphere -->
      <path d="M-5,-38 C-25,-38 -40,-28 -42,-14 C-44,2 -36,14 -28,22 C-34,28 -35,36 -28,42 C-22,48 -12,46 -5,42"
            stroke="#5eead4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
      <!-- Brain right hemisphere -->
      <path d="M5,-38 C25,-38 40,-28 42,-14 C44,2 36,14 28,22 C34,28 35,36 28,42 C22,48 12,46 5,42"
            stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

      <!-- Brain folds left -->
      <path d="M-5,-18 C-18,-16 -28,-8 -30,2" stroke="#5eead4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
      <path d="M-5,8 C-15,12 -24,22 -22,32" stroke="#5eead4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
      <!-- Brain folds right -->
      <path d="M5,-18 C18,-16 28,-8 30,2" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
      <path d="M5,8 C15,12 24,22 22,32" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

      <!-- Neural nodes -->
      <circle cx="-18" cy="-10" r="2.5" fill="#5eead4" opacity="0.6"/>
      <circle cx="-22" cy="18" r="2" fill="#5eead4" opacity="0.5"/>
      <circle cx="18" cy="-10" r="2.5" fill="#60a5fa" opacity="0.6"/>
      <circle cx="22" cy="18" r="2" fill="#60a5fa" opacity="0.5"/>
      <!-- Neural connections -->
      <line x1="-18" y1="-10" x2="-22" y2="18" stroke="#5eead4" stroke-width="0.8" opacity="0.3"/>
      <line x1="18" y1="-10" x2="22" y2="18" stroke="#60a5fa" stroke-width="0.8" opacity="0.3"/>
      <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#ffffff" stroke-width="0.8" opacity="0.1"/>
    </g>

    <!-- Divider line -->
    <line x1="-55" y1="28" x2="55" y2="28" stroke="#d4a843" stroke-width="1" opacity="0.15"/>

    <!-- === CALCULATOR/LEDGER — bottom half === -->
    <g transform="translate(0, 62)">
      <!-- Calculator body -->
      <rect x="-32" y="-22" width="64" height="48" rx="6" stroke="#d4a843" stroke-width="2" fill="none" opacity="0.5"/>
      <!-- Display -->
      <rect x="-26" y="-17" width="52" height="14" rx="3" fill="#d4a843" opacity="0.08"/>
      <text x="22" y="-7" text-anchor="end" font-family="monospace" font-size="10" font-weight="700" fill="#2ecc71" opacity="0.7">-65%</text>
      <!-- Buttons grid -->
      <rect x="-24" y="2" width="10" height="8" rx="2" fill="#d4a843" opacity="0.12"/>
      <rect x="-10" y="2" width="10" height="8" rx="2" fill="#d4a843" opacity="0.12"/>
      <rect x="4" y="2" width="10" height="8" rx="2" fill="#d4a843" opacity="0.12"/>
      <rect x="18" y="2" width="10" height="8" rx="2" fill="#2ecc71" opacity="0.15"/>
      <rect x="-24" y="14" width="10" height="8" rx="2" fill="#d4a843" opacity="0.08"/>
      <rect x="-10" y="14" width="10" height="8" rx="2" fill="#d4a843" opacity="0.08"/>
      <rect x="4" y="14" width="10" height="8" rx="2" fill="#d4a843" opacity="0.08"/>
      <rect x="18" y="14" width="10" height="8" rx="2" fill="#d4a843" opacity="0.1"/>
    </g>

    <!-- Connection: brain → calculator (data flow) -->
    <circle cx="0" cy="22" r="1.5" fill="#d4a843" opacity="0.3"/>
    <circle cx="0" cy="32" r="1.5" fill="#d4a843" opacity="0.2"/>
  </g>

  <!-- "WAS" -->
  <text x="256" y="415" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="800" letter-spacing="8" fill="url(#goldGrad)" opacity="0.95">WAS</text>

  <!-- Gold line -->
  <line x1="130" y1="432" x2="382" y2="432" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- Tagline -->
  <text x="256" y="464" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" letter-spacing="5" fill="#94a3b8" opacity="0.45">CONTABIL</text>
</svg>
