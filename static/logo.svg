<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5dc8a"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="64" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="#d4a843" stroke-width="0.5" opacity="0.03">
    <line x1="96" y1="16" x2="96" y2="496"/>
    <line x1="176" y1="16" x2="176" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="336" y1="16" x2="336" y2="496"/>
    <line x1="416" y1="16" x2="416" y2="496"/>
    <line x1="16" y1="96" x2="496" y2="96"/>
    <line x1="16" y1="176" x2="496" y2="176"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="336" x2="496" y2="336"/>
    <line x1="16" y1="416" x2="496" y2="416"/>
  </g>

  <!-- Shield -->
  <g transform="translate(256, 200)">
    <path d="M0,-120 L100,-90 L100,20 C100,80 55,120 0,145 C-55,120 -100,80 -100,20 L-100,-90 Z"
          stroke="url(#goldGrad)" stroke-width="4.5" fill="none" opacity="0.8"/>
    <path d="M0,-105 L85,-78 L85,16 C85,68 48,104 0,126 C-48,104 -85,68 -85,16 L-85,-78 Z"
          stroke="#d4a843" stroke-width="1.5" fill="none" opacity="0.15"/>

    <!-- Scale of justice -->
    <circle cx="0" cy="-62" r="6" fill="url(#goldGrad)"/>
    <line x1="0" y1="-56" x2="0" y2="50" stroke="url(#goldGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-25" y1="50" x2="25" y2="50" stroke="url(#goldGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-55" y1="-38" x2="55" y2="-38" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Chains -->
    <line x1="-55" y1="-38" x2="-55" y2="-8" stroke="#d4a843" stroke-width="2" opacity="0.5"/>
    <line x1="55" y1="-38" x2="55" y2="2" stroke="#d4a843" stroke-width="2" opacity="0.5"/>

    <!-- Plates -->
    <path d="M-70,-8 C-70,6 -40,6 -40,-8" stroke="#d4a843" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M40,2 C40,16 70,16 70,2" stroke="#2ecc71" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- "WAS" -->
  <text x="256" y="410" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="800" letter-spacing="8" fill="url(#goldGrad)" opacity="0.95">WAS</text>

  <!-- Gold line -->
  <line x1="120" y1="428" x2="392" y2="428" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Tagline -->
  <text x="256" y="462" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500" letter-spacing="5" fill="#94a3b8" opacity="0.5">CONTABIL</text>
</svg>
