<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5dc8a"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5dc8a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#b8922e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f5dc8a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="64" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#d4a843" stroke-width="0.5" opacity="0.04">
    <line x1="96" y1="16" x2="96" y2="496"/>
    <line x1="176" y1="16" x2="176" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="336" y1="16" x2="336" y2="496"/>
    <line x1="416" y1="16" x2="416" y2="496"/>
    <line x1="16" y1="96" x2="496" y2="96"/>
    <line x1="16" y1="176" x2="496" y2="176"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="336" x2="496" y2="336"/>
    <line x1="16" y1="416" x2="496" y2="416"/>
  </g>

  <!-- ===== SHIELD (center, main element) ===== -->
  <g transform="translate(256, 175)">
    <!-- Shield glow -->
    <path d="M0,-95 L80,-70 L80,20 C80,65 45,95 0,115 C-45,95 -80,65 -80,20 L-80,-70 Z"
          fill="url(#shieldGrad)" opacity="0.5"/>

    <!-- Shield outline -->
    <path d="M0,-85 L72,-62 L72,16 C72,58 40,85 0,104 C-40,85 -72,58 -72,16 L-72,-62 Z"
          stroke="url(#goldGrad)" stroke-width="4" fill="none" opacity="0.8"/>

    <!-- Inner shield border -->
    <path d="M0,-72 L60,-52 L60,12 C60,48 34,72 0,88 C-34,72 -60,48 -60,12 L-60,-52 Z"
          stroke="#d4a843" stroke-width="1.5" fill="none" opacity="0.25"/>

    <!-- Scale of justice inside shield -->
    <!-- Pillar -->
    <line x1="0" y1="-45" x2="0" y2="35" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="-20" y1="35" x2="20" y2="35" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Top -->
    <circle cx="0" cy="-48" r="5" fill="url(#goldGrad)"/>
    <!-- Arms -->
    <line x1="-45" y1="-30" x2="45" y2="-30" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Chains -->
    <line x1="-45" y1="-30" x2="-45" y2="-5" stroke="#d4a843" stroke-width="1.5" opacity="0.6"/>
    <line x1="45" y1="-30" x2="45" y2="-5" stroke="#d4a843" stroke-width="1.5" opacity="0.6"/>
    <!-- Left plate -->
    <path d="M-58,-5 C-58,5 -32,5 -32,-5" stroke="#d4a843" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Right plate (lower = heavier = more savings) -->
    <path d="M32,5 C32,15 58,15 58,5" stroke="#2ecc71" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>

    <!-- Percentage symbol on left plate -->
    <text x="-45" y="-12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#d4a843" opacity="0.6">%</text>
    <!-- Dollar on right plate -->
    <text x="45" y="-2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#2ecc71" opacity="0.7">$</text>

    <!-- Desconto arrow going down on right side -->
    <path d="M52,10 L52,22 L48,18 M52,22 L56,18" stroke="#2ecc71" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- ===== CHART BARS (left side) ===== -->
  <g transform="translate(72, 130)">
    <!-- Chart frame -->
    <line x1="0" y1="0" x2="0" y2="120" stroke="#d4a843" stroke-width="1.5" opacity="0.2"/>
    <line x1="0" y1="120" x2="90" y2="120" stroke="#d4a843" stroke-width="1.5" opacity="0.2"/>

    <!-- Bars (representing debt reduction) -->
    <rect x="8" y="20" width="16" height="100" rx="3" fill="url(#barGrad)" opacity="0.5"/>
    <rect x="30" y="40" width="16" height="80" rx="3" fill="url(#barGrad)" opacity="0.6"/>
    <rect x="52" y="55" width="16" height="65" rx="3" fill="url(#barGrad)" opacity="0.7"/>
    <rect x="74" y="75" width="16" height="45" rx="3" fill="#2ecc71" opacity="0.6"/>

    <!-- Trend line (descending = savings) -->
    <polyline points="16,18 38,38 60,52 82,72"
              stroke="#2ecc71" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

    <!-- Arrow down at end -->
    <path d="M82,72 L82,85 M78,80 L82,85 L86,80"
          stroke="#2ecc71" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- ===== DOCUMENT (right side) ===== -->
  <g transform="translate(365, 120)">
    <!-- Document -->
    <rect x="0" y="0" width="80" height="105" rx="6" fill="#ffffff" opacity="0.08"/>
    <rect x="0" y="0" width="80" height="105" rx="6" stroke="#d4a843" stroke-width="1.5" fill="none" opacity="0.25"/>

    <!-- Folded corner -->
    <path d="M55,0 L80,25 L55,25 Z" fill="#d4a843" opacity="0.1"/>

    <!-- Text lines -->
    <line x1="12" y1="40" x2="50" y2="40" stroke="#d4a843" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="12" y1="52" x2="65" y2="52" stroke="#d4a843" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <line x1="12" y1="64" x2="55" y2="64" stroke="#d4a843" stroke-width="3" stroke-linecap="round" opacity="0.15"/>
    <line x1="12" y1="76" x2="42" y2="76" stroke="#d4a843" stroke-width="3" stroke-linecap="round" opacity="0.1"/>

    <!-- Check mark on document -->
    <circle cx="62" cy="85" r="10" fill="#2ecc71" opacity="0.15"/>
    <polyline points="56,85 60,90 68,80" stroke="#2ecc71" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- ===== CONNECTION LINES ===== -->
  <!-- Chart to shield -->
  <line x1="162" y1="195" x2="190" y2="185" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <circle cx="176" cy="190" r="2" fill="#d4a843" opacity="0.4"/>

  <!-- Shield to document -->
  <line x1="322" y1="185" x2="365" y2="175" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <circle cx="344" cy="180" r="2" fill="#d4a843" opacity="0.4"/>

  <!-- ===== RATING BADGES (below shield) ===== -->
  <g transform="translate(256, 310)">
    <rect x="-80" y="0" width="32" height="18" rx="9" fill="#27ae60" opacity="0.2"/>
    <text x="-64" y="13" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2ecc71" opacity="0.8">A</text>

    <rect x="-32" y="0" width="32" height="18" rx="9" fill="#f39c12" opacity="0.2"/>
    <text x="-16" y="13" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f39c12" opacity="0.8">B</text>

    <rect x="0" y="0" width="32" height="18" rx="9" fill="#e67e22" opacity="0.2"/>
    <text x="16" y="13" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#e67e22" opacity="0.8">C</text>

    <rect x="48" y="0" width="32" height="18" rx="9" fill="#e74c3c" opacity="0.2"/>
    <text x="64" y="13" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#e74c3c" opacity="0.8">D</text>
  </g>

  <!-- ===== BOTTOM: "WAS CONTABIL" text ===== -->
  <text x="256" y="390" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="800" letter-spacing="6" fill="url(#goldGrad)" opacity="0.95">WAS</text>

  <!-- Gold line decoration -->
  <line x1="100" y1="408" x2="412" y2="408" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="140" y1="420" x2="372" y2="420" stroke="#d4a843" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Tagline -->
  <text x="256" y="450" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="6" fill="#d4a843" opacity="0.5">CONTABIL</text>
  <text x="256" y="472" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="400" letter-spacing="3" fill="#94a3b8" opacity="0.4">TRANSACAO TRIBUTARIA</text>
</svg>
