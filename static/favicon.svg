<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5dc8a"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M32,10 L50,18 L50,34 C50,46 42,54 32,58 C22,54 14,46 14,34 L14,18 Z"
        stroke="url(#gold)" stroke-width="2.5" fill="none" opacity="0.85"/>
  <!-- Scale pillar -->
  <line x1="32" y1="20" x2="32" y2="44" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Scale arms -->
  <line x1="22" y1="27" x2="42" y2="27" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <!-- Scale top -->
  <circle cx="32" cy="19" r="3" fill="url(#gold)"/>
  <!-- Base -->
  <line x1="26" y1="44" x2="38" y2="44" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Plates -->
  <path d="M18,32 C18,36 26,36 26,32" stroke="#d4a843" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M38,35 C38,39 46,39 46,35" stroke="#2ecc71" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- W -->
  <text x="32" y="57" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="800" fill="#d4a843" opacity="0.6" letter-spacing="1">WAS</text>
</svg>
